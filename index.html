<!DOCTYPE html>
<html>
<head>
  <title>Simple Web Proxy</title>
  <style>
    body { font-family: sans-serif; background: #fff; color: #222; margin: 10px; }
    input[type=text] { width: 250px; }
  </style>
</head>
<body>
  <h2>Simple Web Proxy</h2>
  <p>To visit a site, enter its address in the browser like this:</p>
  <pre>http://yourproxy.com/http://example.com</pre>
  <form action="/" method="GET">
    <label for="url">Or enter a web address:</label><br>
    <input type="text" name="url" id="url" value="http://" size="35">
    <input type="submit" value="Go">
  </form>
  <p>
    Works best with simple pages.<br>
    All navigation is proxied. CSS/scripts/images are simplified for old devices.
  </p>
</body>
</html>
